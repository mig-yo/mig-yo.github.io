<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MigYo™</title>
<meta name="description" content="Graphic designer and visual artist based in England. With over three years of experience across brand identity, art direction, product design, and digital illustration.">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0a0a0a;
    --fg: #f5f5f5;
    --fg-dim: #6b6b6b;
    --border: #2a2a2a;
    --border-hover: #4a4a4a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    font-weight: 300;
    min-height: 100vh;
  }

  body {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  a { color: inherit; text-decoration: none; }

  .wrap {
    max-width: 600px;
    width: 100%;
    margin: 0 auto;
    padding: 60px 16px 0;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  /* Logo */
  .logo {
    font-weight: 300;
    margin-bottom: 36px;
    display: inline-flex;
    align-items: baseline;
    overflow: hidden;
    white-space: nowrap;
    cursor: default;
  }

  .logo-inner {
    display: inline-flex;
    align-items: baseline;
    cursor: default;
  }

  .logo-static {
    display: inline-block;
  }

  .logo-hidden {
    display: inline-block;
    max-width: 0;
    opacity: 0;
    overflow: hidden;
    transition: max-width 0.2s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.15s ease;
  }

  .logo-inner:hover .logo-hidden {
    max-width: 120px;
    opacity: 1;
    transition: max-width 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease;
  }

  /* Keycaps */
  .keycaps {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 36px;
  }

  .keycaps-row {
    display: flex;
    gap: 12px;
  }

  .keycap {
    border-width: 1px 2px 3px 2px;
    border-style: solid;
    border-color: var(--border);
    border-radius: 14px;
    padding: 0 0 0 16px;
    font-size: 30px;
    font-weight: 300;
    background: transparent;
    color: var(--fg);
    cursor: default;
    transition: border-color 0.2s ease, background 0.2s ease, transform 0.1s ease, border-width 0.1s ease;
    font-family: 'Inter', sans-serif;
    height: 67px;
    text-align: left;
    white-space: nowrap;
    overflow: hidden;
    display: flex;
    align-items: center;
  }

  .keycap:hover {
    background: #0f0f0f;
  }

  .keycap.pressed {
    border-bottom-width: 2px;
    transform: translateY(1px);
  }

  .keycap.icon {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 67px;
    height: 67px;
    padding: 0;
    cursor: pointer;
  }

  .keycap.icon svg {
    width: 40px;
    height: 40px;
  }

  .keycap-word {
    display: inline-block;
  }

  /* Project list */
  .projects {
    display: flex;
    flex-direction: column;
  }

  .project-row {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: end;
    padding: 16px 0;
    gap: 24px;
    transition: padding 0.2s ease;
  }

  .project-row:first-child {
    border-top: none;
  }

  .project-row:hover {
    padding: 16px;
    cursor: pointer;
  }

  .project-row:hover .project-title { color: #fff; }
  .project-row:hover { cursor: pointer; }

  .project-left {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .project-title {
    font-weight: 300;
    color: var(--fg);
    transition: color 0.15s ease;
  }

  .project-meta {
    color: var(--fg-dim);
  }

  .project-year {
    color: var(--fg-dim);
    white-space: nowrap;
  }

  /* Footer */
  .footer {
    max-width: 600px;
    width: 100%;
    margin: 0 auto;
    padding: 40px 16px 60px;
    display: flex;
    gap: 18px;
    align-items: center;
    padding-top: 40px;
  }

  .footer a { color: var(--fg); transition: color 0.3s ease; }
  .footer a:hover { color: var(--fg-dim); }
  .footer .location { color: var(--fg-dim); }

  @media (max-width: 640px) {
    .wrap { padding-top: 16px; }
    .footer { padding-top: 16px; padding-bottom: 16px; }
    .project-row { grid-template-columns: 1fr; gap: 4px; }
  }
</style>
</head>
<body>

  <div class="wrap">
    <div class="logo"><span class="logo-inner"><span class="logo-static">Mig</span><span class="logo-hidden">uel </span><span class="logo-static">Yo</span><span class="logo-hidden">ung</span><span class="logo-static">™</span></span></div>

    <div class="keycaps">
      <div class="keycaps-row">
        <button class="keycap" data-toggle="0" style="width:160px"><span class="keycap-word">Brand</span></button>
        <button class="keycap" data-toggle="1" style="width:160px"><span class="keycap-word">Design</span></button>
      </div>
      <div class="keycaps-row">
        <button class="keycap" data-toggle="2" style="width:112px"><span class="keycap-word">Art</span></button>
        <button class="keycap" data-toggle="3" style="width:180px"><span class="keycap-word">Direction</span></button>
        <button class="keycap icon" id="icon-btn" aria-label="Switch icon">
          <svg id="icon-svg" xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 18 18">
            <ellipse cx="9" cy="9" rx="3" ry="7.25" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1"></ellipse>
            <line x1="1.75" y1="9" x2="16.25" y2="9" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1"></line>
            <circle cx="9" cy="9" r="7.25" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1"></circle>
          </svg>
        </button>
      </div>
    </div>

    <div class="projects" id="projects">
      <!-- Populated from data -->
    </div>
  </div>

  <div class="footer">
    <a href="mailto:contact@migyo.uk">Contact</a>
    <a href="/info">Info</a>
    <span class="location">London, England</span>
  </div>

<script>
  // ---- Keycap press + toggle ----
  const toggles = [
    ["Brand", "Product"],
    ["Design", "Identity"],
    ["Art", "App"],
    ["Direction", "Creation"]
  ];

  const CLICK_SOUND = "https://framerusercontent.com/assets/b6O6U2dUrCGEoZvsjHB0FHKiM.mp3";

  document.querySelectorAll('.keycap[data-toggle]').forEach(btn => {
    const i = parseInt(btn.dataset.toggle, 10);
    const wordEl = btn.querySelector('.keycap-word');
    let active = false;
    btn.style.cursor = 'pointer';

    btn.addEventListener('mousedown', () => {
      btn.classList.add('pressed');
      try {
        const audio = new Audio(CLICK_SOUND);
        audio.volume = 0.5;
        audio.play().catch(() => {});
      } catch(e) {}
    });

    btn.addEventListener('mouseup', () => {
      btn.classList.remove('pressed');
      active = !active;
      wordEl.textContent = toggles[i][active ? 1 : 0];
    });

    btn.addEventListener('mouseleave', () => {
      btn.classList.remove('pressed');
    });

    btn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      btn.classList.add('pressed');
      try {
        const audio = new Audio(CLICK_SOUND);
        audio.volume = 0.5;
        audio.play().catch(() => {});
      } catch(e) {}
    });

    btn.addEventListener('touchend', () => {
      btn.classList.remove('pressed');
      active = !active;
      wordEl.textContent = toggles[i][active ? 1 : 0];
    });
  });

  // ---- Icon button cycling ----
  const iconSVGs = [
    // Globe
    `<ellipse cx="9" cy="9" rx="3" ry="7.25" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1"></ellipse><line x1="1.75" y1="9" x2="16.25" y2="9" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1"></line><circle cx="9" cy="9" r="7.25" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1"></circle>`,
    // Asterisk
    `<line x1="9" y1="15.75" x2="9" y2="2.25" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1"></line><line x1="14.846" y1="12.375" x2="3.154" y2="5.625" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1"></line><line x1="3.154" y1="12.375" x2="14.846" y2="5.625" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1"></line>`,
    // Circles
    `<circle cx="7" cy="7" r="5.25" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1"></circle><circle cx="11" cy="11" r="5.25" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1"></circle>`,
    // Hand wave
    `<path d="m9.1015,6.8586l-3.7123-3.7123c-.4879-.4879-1.2827-.4851-1.7678,0s-.4879,1.2799,0,1.7678l3.7123,3.7123" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1"></path><path d="m4.5053,5.798c-.4879-.4879-1.2827-.4851-1.7678,0s-.4879,1.2799,0,1.7678l2.8284,2.8284" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1"></path><path d="m3.7975,8.6271c-.4879-.4879-1.2827-.4851-1.7678,0s-.4879,1.2799,0,1.7678l4.2433,4.2433c1.9523,1.9523,5.1187,1.9523,7.0711,0l1.2339-1.2339c1.4354-1.4354,2.0478-3.5002,1.6263-5.4871l-.7453-3.5171c-.1633-.7191-.7085-1.1738-1.3902-1.0918s-1.1745.705-1.0918,1.3902l.3422,2.8426-5.2786-5.2786c-.4879-.4879-1.2827-.4851-1.7678,0s-.4879,1.2799,0,1.7678" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1"></path><path d="m13.3194,7.541c-1.684.6567-2.4676,1.8203-2.3507,3.4902" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1"></path>`,
    // Scribble
    `<path d="M1.75,9.881S5.824,5.674,8.142,3.85c1.55-1.219,2.463-1.339,3.025-.778,1.025,1.021-.407,2.918-2.358,5.512s-3.363,4.082-2.294,5.091c1.055,.996,3.237-1.232,4.05-2.14s2.669-2.922,3.578-2.075c.805,.75-.39,2.562-.813,3.372s-.943,1.646-.325,2.205c.874,.791,2.245-.876,2.245-.876" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1"></path>`
  ];

  let iconIndex = 0;
  const iconBtn = document.getElementById('icon-btn');
  const iconSvg = document.getElementById('icon-svg');

  iconBtn.addEventListener('mousedown', () => {
    iconBtn.classList.add('pressed');
    try {
      const audio = new Audio(CLICK_SOUND);
      audio.volume = 0.5;
      audio.play().catch(() => {});
    } catch(e) {}
  });

  iconBtn.addEventListener('mouseup', () => {
    iconBtn.classList.remove('pressed');
    iconIndex = (iconIndex + 1) % iconSVGs.length;
    iconSvg.innerHTML = iconSVGs[iconIndex];
  });

  iconBtn.addEventListener('mouseleave', () => {
    iconBtn.classList.remove('pressed');
  });

  iconBtn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    iconBtn.classList.add('pressed');
    try {
      const audio = new Audio(CLICK_SOUND);
      audio.volume = 0.5;
      audio.play().catch(() => {});
    } catch(e) {}
  });

  iconBtn.addEventListener('touchend', () => {
    iconBtn.classList.remove('pressed');
    iconIndex = (iconIndex + 1) % iconSVGs.length;
    iconSvg.innerHTML = iconSVGs[iconIndex];
  });
  const projects = [
    { title: "Flutter App", category: "Branding + Product Design", year: "2026", url: "/flutter" },
    { title: "Carrior App", category: "Product Design", year: "2026", url: "/carrior" },
    { title: "Mosaic", category: "Brand Design", year: "2025", url: "/mosaic" },
    { title: "Holoramic", category: "Brand Design", year: "2025", url: "/holoramic" }
  ];

  // ---- Project list (will later be swapped for content.json) ----
  const list = document.getElementById('projects');
  projects.forEach(p => {
    const row = document.createElement('a');
    row.href = p.url;
    row.className = 'project-row';
    row.innerHTML = `
      <div class="project-left">
        <div class="project-title">${p.title}</div>
        <div class="project-meta">${p.category}</div>
      </div>
      <div class="project-year">${p.year}</div>
    `;
    list.appendChild(row);
  });
</script>

</body>
</html>
